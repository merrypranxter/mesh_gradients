<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>example 02 — minimal IDW mesh gradient</title>
<style>html,body{margin:0;height:100%;background:#000}canvas{display:block;width:100vw;height:100vh}</style>
</head>
<body>
<canvas id="gl"></canvas>
<script>
// =============================================================================
// The smallest possible OKLab IDW gradient — one file, inline shaders, no
// imports. Read main.js for the real thing; read this to understand the core in
// 60 lines. Works on file:// because nothing is fetched.
// =============================================================================
const canvas = document.getElementById('gl');
const gl = canvas.getContext('webgl2');
const resize = () => { canvas.width = innerWidth; canvas.height = innerHeight; };
resize(); addEventListener('resize', resize);

const VERT = `#version 300 es
in vec2 p; out vec2 uv;
void main(){ uv = p*0.5+0.5; gl_Position = vec4(p,0,1); }`;

const FRAG = `#version 300 es
precision highp float;
in vec2 uv; out vec4 o;
uniform vec2 u_res; uniform float u_t;
#define N 5
vec2  pts[N];
vec3  cols[N];
vec3 s2l(vec3 c){ return mix(c/12.92, pow((c+.055)/1.055,vec3(2.4)), step(.04045,c)); }
vec3 l2s(vec3 c){ return mix(c*12.92, 1.055*pow(c,vec3(1./2.4))-.055, step(.0031308,c)); }
vec3 s2lab(vec3 c){ c=s2l(c);
  float l=.4122*c.r+.5363*c.g+.0514*c.b, m=.2119*c.r+.6807*c.g+.1074*c.b, s=.0883*c.r+.2817*c.g+.6300*c.b;
  l=pow(l,1./3.); m=pow(m,1./3.); s=pow(s,1./3.);
  return vec3(.2105*l+.7936*m-.0041*s, 1.9780*l-2.4286*m+.4506*s, .0259*l+.7828*m-.8087*s); }
vec3 lab2s(vec3 lab){
  float l=lab.x+.3963*lab.y+.2158*lab.z, m=lab.x-.1056*lab.y-.0639*lab.z, s=lab.x-.0895*lab.y-1.2915*lab.z;
  l=l*l*l; m=m*m*m; s=s*s*s;
  return clamp(l2s(vec3(4.0767*l-3.3077*m+.2310*s, -1.2684*l+2.6098*m-.3413*s, -.0042*l-.7034*m+1.7076*s)),0.,1.); }
void main(){
  // five drifting points + neon palette
  for(int i=0;i<N;i++){ float a=float(i)/float(N)*6.2831 + u_t*.2;
    pts[i]=vec2(.5+cos(a)*.3, .5+sin(a*1.3)*.3); }
  cols[0]=vec3(1.,0.,.4); cols[1]=vec3(0.,.88,1.); cols[2]=vec3(1.,.9,0.);
  cols[3]=vec3(.48,0.,1.); cols[4]=vec3(0.,1.,.6);
  float aspect=u_res.x/u_res.y;
  vec3 lab=vec3(0.); float ws=0.;
  for(int i=0;i<N;i++){ float d=length((uv-pts[i])*vec2(aspect,1.)); d=max(d,1e-4);
    float w=1./pow(d,2.5); lab+=w*s2lab(cols[i]); ws+=w; }
  o=vec4(lab2s(lab/ws),1.);
}`;

function sh(type, src){ const s=gl.createShader(type); gl.shaderSource(s,src); gl.compileShader(s);
  if(!gl.getShaderParameter(s,gl.COMPILE_STATUS)) throw gl.getShaderInfoLog(s); return s; }
const prog=gl.createProgram();
gl.attachShader(prog, sh(gl.VERTEX_SHADER,VERT));
gl.attachShader(prog, sh(gl.FRAGMENT_SHADER,FRAG));
gl.linkProgram(prog); gl.useProgram(prog);

const buf=gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER,buf);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,3,-1,-1,3]),gl.STATIC_DRAW);
const loc=gl.getAttribLocation(prog,'p'); gl.enableVertexAttribArray(loc);
gl.vertexAttribPointer(loc,2,gl.FLOAT,false,0,0);

const t0=performance.now();
(function loop(){
  gl.viewport(0,0,canvas.width,canvas.height);
  gl.uniform2f(gl.getUniformLocation(prog,'u_res'),canvas.width,canvas.height);
  gl.uniform1f(gl.getUniformLocation(prog,'u_t'),(performance.now()-t0)/1000);
  gl.drawArrays(gl.TRIANGLES,0,3);
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
